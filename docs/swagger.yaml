openapi: 3.0.0
info:
  title: Navin Backend API
  version: 1.0.0
paths:
  /api/webhooks/iot:
    post:
      summary: IoT webhook endpoint for telemetry data
      description: Receives telemetry data from IoT sensors. Requires API key authentication.
      security:
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - shipmentId
                - temperature
                - humidity
                - latitude
                - longitude
                - batteryLevel
                - timestamp
              properties:
                shipmentId:
                  type: string
                  description: MongoDB ObjectId of the shipment
                temperature:
                  type: number
                  description: Temperature in Celsius
                humidity:
                  type: number
                  description: Humidity percentage
                latitude:
                  type: number
                  description: GPS latitude
                longitude:
                  type: number
                  description: GPS longitude
                batteryLevel:
                  type: number
                  description: Battery level percentage
                timestamp:
                  type: string
                  format: date-time
                  description: Timestamp of the telemetry reading
      responses:
        '201':
          description: Telemetry data received and processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      _id:
                        type: string
                      shipmentId:
                        type: string
                      temperature:
                        type: number
                      humidity:
                        type: number
                      latitude:
                        type: number
                      longitude:
                        type: number
                      batteryLevel:
                        type: number
                      timestamp:
                        type: string
                        format: date-time
                      dataHash:
                        type: string
                      stellarTxHash:
                        type: string
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/webhooks/stellar:
    post:
      summary: Stellar proof-of-delivery webhook
      description: Receives Stellar settlement callbacks for proof-of-delivery events. The webhook payload must include the transaction hash and event type, and may include an optional HMAC signature header for verification.
      security:
        - stellarSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
                - type
                - paymentId
                - transactionHash
                - amount
                - timestamp
              properties:
                id:
                  type: string
                  description: Unique Stellar webhook event identifier
                type:
                  type: string
                  enum: [release, escrow, failed]
                  description: Stellar webhook event type
                paymentId:
                  type: string
                  description: Payment identifier linked to the shipment
                transactionHash:
                  type: string
                  description: Stellar transaction hash for the settlement event
                amount:
                  type: number
                  description: Amount associated with the Stellar event
                timestamp:
                  type: string
                  format: date-time
                  description: ISO 8601 timestamp for the webhook event
                signature:
                  type: string
                  description: Optional HMAC signature value for webhook verification
      responses:
        '200':
          description: Stellar webhook received and processed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      event:
                        type: string
                      paymentId:
                        type: string
                      status:
                        type: string
                      transactionHash:
                        type: string
        '400':
          description: Invalid Stellar webhook payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/health:
    get:
      summary: Health check
      description: Public health endpoint used by load balancers and uptime monitors.
      responses:
        '200':
          description: Service health metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: OK
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: active
                      uptime:
                        type: number
                        description: Process uptime in seconds
                      timestamp:
                        type: string
                        format: date-time
                        description: Current UTC timestamp
  /api/auth/api-keys:
    post:
      summary: Create a new API key
      description: Generates a new API key for machine-to-machine authentication. The raw API key is returned only once.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - organizationId
              properties:
                name:
                  type: string
                  description: Descriptive name for the API key
                organizationId:
                  type: string
                  description: MongoDB ObjectId of the organization
                shipmentId:
                  type: string
                  description: Optional MongoDB ObjectId of a specific shipment
      responses:
        '201':
          description: API key created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      apiKey:
                        type: string
                        description: Raw API key (shown only once)
                      id:
                        type: string
                      name:
                        type: string
                      organizationId:
                        type: string
                      shipmentId:
                        type: string
                      createdAt:
                        type: string
                        format: date-time
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/auth/signup:
    post:
      summary: Register a new user
      description: Creates a new user account. organizationId is optional.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - name
                - password
              properties:
                email:
                  type: string
                  format: email
                  description: User email address
                name:
                  type: string
                  minLength: 1
                  description: User full name
                password:
                  type: string
                  minLength: 8
                  description: Password (minimum 8 characters)
                organizationId:
                  type: string
                  description: Optional organization ID to associate with user
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                      token:
                        type: string
                  meta:
                    type: object
        '400':
          description: Validation error (e.g., password too short, missing required fields)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/auth/login:
    post:
      summary: Authenticate a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                  meta:
                    type: object
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many login attempts
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  retryAfter:
                    type: integer
                  data:
                    type: 'null'
  /api/auth/api-keys/{organizationId}:
    get:
      summary: List API keys for an organization
      description: Returns all active API keys for the specified organization (without exposing the raw keys)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: organizationId
          required: true
          schema:
            type: string
          description: MongoDB ObjectId of the organization
      responses:
        '200':
          description: List of API keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        _id:
                          type: string
                        name:
                          type: string
                        organizationId:
                          type: string
                        shipmentId:
                          type: string
                        isActive:
                          type: boolean
                        lastUsedAt:
                          type: string
                          format: date-time
                        createdAt:
                          type: string
                          format: date-time
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/auth/api-keys/{apiKeyId}:
    delete:
      summary: Revoke an API key
      description: Deactivates an API key, preventing it from being used for authentication
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: apiKeyId
          required: true
          schema:
            type: string
          description: MongoDB ObjectId of the API key
      responses:
        '200':
          description: API key revoked successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: API key not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/users/invitations:
    post:
      summary: Generate user invitation link
      description: Creates a signed 48-hour invitation token bound to the inviter organization and target role.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - role
              properties:
                email:
                  type: string
                  format: email
                role:
                  type: string
                  enum: [ADMIN, MANAGER, VIEWER, CUSTOMER]
      responses:
        '201':
          description: Invitation generated
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/users/invitations/verify:
    get:
      summary: Verify invitation token
      parameters:
        - in: query
          name: token
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invitation token is valid
        '401':
          description: Invalid or expired invitation token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/users/invitations/accept:
    post:
      summary: Accept invitation and create account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - name
                - password
              properties:
                token:
                  type: string
                name:
                  type: string
                password:
                  type: string
                  minLength: 6
      responses:
        '201':
          description: Invitation accepted
        '401':
          description: Invalid or expired invitation token
        '409':
          description: Email already in use
  /api/users/{id}:
    delete:
      summary: Delete a user (soft delete)
      description: Soft-deletes a user by setting deletedAt. Requires ADMIN or SUPER_ADMIN role.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: MongoDB ObjectId of the user to delete
      responses:
        '200':
          description: User deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: User deleted successfully
                  data:
                    type: object
                    properties:
                      _id:
                        type: string
                      email:
                        type: string
                      name:
                        type: string
                      role:
                        type: string
                      organizationId:
                        type: string
                      deletedAt:
                        type: string
                        format: date-time
        '400':
          description: Invalid or missing id parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid auth token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden – insufficient role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/analytics/performance:
    get:
      summary: Get analytics performance dashboard
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: startDate
          required: true
          schema:
            type: string
            format: date-time
        - in: query
          name: endDate
          required: true
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Performance dashboard
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      startDate:
                        type: string
                        format: date-time
                      endDate:
                        type: string
                        format: date-time
                      shipmentsByStatus:
                        type: array
                        items:
                          type: object
                          properties:
                            status:
                              type: string
                            total:
                              type: integer
                      averageDeliveryTimeByLogisticsId:
                        type: array
                        items:
                          type: object
                          properties:
                            logisticsId:
                              type: string
                            averageDeliveryTimeMs:
                              type: number
                      totalDelayedShipments:
                        type: integer
  /api/payments:
    get:
      summary: Get payments history
      description: Returns settlement records for the authenticated user's organization.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [Pending, Escrowed, Released, Failed]
          description: Filter payments by status.
        - in: query
          name: cursor
          schema:
            type: string
          description: Cursor for pagination.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Maximum number of records to return.
      responses:
        '200':
          description: Payments retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        _id:
                          type: string
                        shipmentId:
                          type: string
                        organizationId:
                          type: string
                        amount:
                          type: number
                        tokenType:
                          type: string
                        status:
                          type: string
                        stellarTxHash:
                          type: string
                        createdAt:
                          type: string
                          format: date-time
                        updatedAt:
                          type: string
                          format: date-time
                  meta:
                    type: object
                    properties:
                      count:
                        type: integer
  /api/telemetry:
    get:
      summary: Get telemetry records
      description: Retrieve telemetry time-series points with optional shipment filtering and pagination.
      parameters:
        - in: query
          name: shipmentId
          schema:
            type: string
          description: Filter telemetry records by shipment ID.
        - in: query
          name: from
          schema:
            type: string
            format: date-time
          description: Return telemetry recorded at or after this timestamp.
        - in: query
          name: to
          schema:
            type: string
            format: date-time
          description: Return telemetry recorded at or before this timestamp.
        - in: query
          name: cursor
          schema:
            type: string
          description: Cursor for cursor-based pagination.
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number for offset-based pagination.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Number of records to return.
      responses:
        '200':
          description: Telemetry retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        _id:
                          type: string
                        shipmentId:
                          type: string
                        sensorId:
                          type: string
                        temperature:
                          type: number
                        humidity:
                          type: number
                        latitude:
                          type: number
                        longitude:
                          type: number
                        batteryLevel:
                          type: number
                        timestamp:
                          type: string
                          format: date-time
                        dataHash:
                          type: string
                        stellarTxHash:
                          type: string
                        anchorStatus:
                          type: string
                        anchorError:
                          type: string
                        createdAt:
                          type: string
                          format: date-time
                        updatedAt:
                          type: string
                          format: date-time
                  meta:
                    type: object
                    properties:
                      nextCursor:
                        type: string
                        nullable: true
                      hasMore:
                        type: boolean
                      page:
                        type: integer
  /api/shipments:
    get:
      summary: Get paginated shipments with offset-based pagination
      description: Returns a paginated list of shipments. Uses offset-based pagination with page and limit parameters.
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [CREATED, IN_TRANSIT, DELIVERED, CANCELLED]
          description: Filter shipments by status
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number (starts at 1)
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Number of items per page (max 100)
        - in: query
          name: origin
          schema:
            type: string
          description: Filter by origin location (case-insensitive partial match)
        - in: query
          name: destination
          schema:
            type: string
          description: Filter by destination location (case-insensitive partial match)
      responses:
        '200':
          description: Paginated shipments retrieved successfully
          headers:
            X-Request-ID:
              description: Unique request identifier for tracking and debugging
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Shipments retrieved"
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Shipment'
                  meta:
                    type: object
                    properties:
                      page:
                        type: integer
                        description: Current page number
                        example: 1
                      limit:
                        type: integer
                        description: Items per page
                        example: 20
                      total:
                        type: integer
                        description: Total number of shipments matching the query
                        example: 150
        '400':
          description: Invalid query parameters (e.g., page < 1, limit > 100)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create a shipment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Shipment'
      responses:
        '201':
          description: Shipment created
  /api/shipments/{id}:
    patch:
      summary: Update off-chain metadata
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                offChainMetadata:
                  type: object
      responses:
        '200':
          description: Shipment updated
  /api/shipments/{id}/proof:
    post:
      summary: Upload proof of delivery for a shipment
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                recipientSignatureName:
                  type: string
                notes:
                  type: string
      responses:
        '200':
          description: Proof uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      deliveryProof:
                        type: object
                        properties:
                          url:
                            type: string
                          recipientSignatureName:
                            type: string
                          notes:
                            type: string
                          uploadedAt:
                            type: string
                            format: date-time
        '400':
          description: Missing file or invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Storage unavailable
  /api/anomalies:
    get:
      summary: Get anomalies with pagination and filtering
      description: Retrieve a paginated list of anomalies, sorted by timestamp descending. Supports filtering by severity and shipmentId. Requires ADMIN or MANAGER role.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: cursor
          schema:
            type: string
          description: Cursor for pagination
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
          description: Number of items per page
        - in: query
          name: shipmentId
          schema:
            type: string
          description: Filter by shipment ID
        - in: query
          name: severity
          schema:
            type: string
            enum: [LOW, MEDIUM, HIGH]
          description: Filter by severity
        - in: query
          name: type
          schema:
            type: string
            enum: [TEMPERATURE_EXCEEDED, TEMPERATURE_BELOW_MIN, HUMIDITY_EXCEEDED, HUMIDITY_BELOW_MIN, BATTERY_LOW]
          description: Filter by anomaly type
        - in: query
          name: resolved
          schema:
            type: boolean
          description: Filter by whether an anomaly has been resolved
      responses:
        '200':
          description: Paginated anomalies
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Anomaly'
                  nextCursor:
                    type: string
                    nullable: true
                  hasMore:
                    type: boolean
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - insufficient role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/anomalies/{id}/resolve:
    patch:
      summary: Resolve an anomaly
      description: Mark an anomaly as resolved. Requires ADMIN or MANAGER role.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Anomaly ID
      responses:
        '200':
          description: Anomaly resolved
          content:
            application/json:
              schema:
                type: object
                properties:
                  anomaly:
                    $ref: '#/components/schemas/Anomaly'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - insufficient role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Anomaly not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    ErrorResponse:
      type: object
      required:
        - success
        - message
        - data
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          description: Error message describing why the request failed.
        data:
          type: object
          nullable: true
          description: Null payload for error responses.
    Shipment:
      type: object
      properties:
        trackingNumber:
          type: string
        origin:
          type: string
        destination:
          type: string
        enterpriseId:
          type: string
        logisticsId:
          type: string
        status:
          type: string
          enum: [CREATED, IN_TRANSIT, DELIVERED, CANCELLED]
        milestones:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
